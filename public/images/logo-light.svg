<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 52" width="280" height="52">
  <defs>
    <linearGradient id="wave-grad-light" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4603a"/>
      <stop offset="50%" stop-color="#e8845a"/>
      <stop offset="100%" stop-color="#f4a261"/>
    </linearGradient>
    <linearGradient id="brain-grad-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4603a"/>
      <stop offset="100%" stop-color="#2a6b5a"/>
    </linearGradient>
  </defs>

  <!-- Brain-EEG Icon Mark -->
  <g transform="translate(4, 4)">
    <!-- Stylized brain outline (left hemisphere) -->
    <path d="M22 6 C16 6, 8 10, 8 20 C8 26, 10 30, 14 34 C16 36, 18 38, 22 38"
          fill="none" stroke="#1a1a2e" stroke-width="1.8" stroke-linecap="round" opacity="0.25"/>
    <!-- Stylized brain outline (right hemisphere) -->
    <path d="M22 6 C28 6, 36 10, 36 20 C36 26, 34 30, 30 34 C28 36, 26 38, 22 38"
          fill="none" stroke="#1a1a2e" stroke-width="1.8" stroke-linecap="round" opacity="0.25"/>
    <!-- Central sulcus -->
    <path d="M22 8 L22 36" fill="none" stroke="#1a1a2e" stroke-width="1" stroke-linecap="round" opacity="0.12"/>

    <!-- EEG waveform through brain -->
    <path d="M6 22 L12 22 L15 16 L18 28 L21 12 L24 32 L27 14 L30 26 L33 22 L38 22"
          fill="none" stroke="url(#brain-grad-light)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Small neural dots -->
    <circle cx="14" cy="14" r="1.5" fill="#d4603a" opacity="0.35"/>
    <circle cx="30" cy="14" r="1.5" fill="#2a6b5a" opacity="0.35"/>
    <circle cx="14" cy="30" r="1.5" fill="#f4a261" opacity="0.3"/>
    <circle cx="30" cy="30" r="1.5" fill="#d4603a" opacity="0.3"/>
  </g>

  <!-- Wordmark -->
  <text x="52" y="34" font-family="'Fraunces', Georgia, serif" font-weight="800" font-size="30" letter-spacing="-0.5">
    <tspan fill="#1a1a2e">Ped</tspan><tspan fill="#d4603a" font-size="33">Q</tspan><tspan fill="#d4603a">u</tspan><tspan fill="#1a1a2e">EST</tspan>
  </text>

  <!-- Decorative EEG underline -->
  <path d="M52 42 L68 42 L72 38 L76 46 L80 36 L84 48 L88 37 L92 44 L96 42 L270 42"
        fill="none" stroke="url(#wave-grad-light)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
</svg>