<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 52" width="280" height="52">
  <defs>
    <linearGradient id="wave-grad-dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <linearGradient id="brain-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
  </defs>

  <!-- Brain-EEG Icon Mark -->
  <g transform="translate(4, 4)">
    <!-- Stylized brain outline (left hemisphere) -->
    <path d="M22 6 C16 6, 8 10, 8 20 C8 26, 10 30, 14 34 C16 36, 18 38, 22 38"
          fill="none" stroke="#e0e0e6" stroke-width="1.8" stroke-linecap="round" opacity="0.2"/>
    <!-- Stylized brain outline (right hemisphere) -->
    <path d="M22 6 C28 6, 36 10, 36 20 C36 26, 34 30, 30 34 C28 36, 26 38, 22 38"
          fill="none" stroke="#e0e0e6" stroke-width="1.8" stroke-linecap="round" opacity="0.2"/>
    <!-- Central sulcus -->
    <path d="M22 8 L22 36" fill="none" stroke="#e0e0e6" stroke-width="1" stroke-linecap="round" opacity="0.1"/>

    <!-- EEG waveform through brain -->
    <path d="M6 22 L12 22 L15 16 L18 28 L21 12 L24 32 L27 14 L30 26 L33 22 L38 22"
          fill="none" stroke="url(#brain-grad-dark)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Small neural dots with glow -->
    <circle cx="14" cy="14" r="1.5" fill="#a78bfa" opacity="0.45"/>
    <circle cx="30" cy="14" r="1.5" fill="#6ee7b7" opacity="0.45"/>
    <circle cx="14" cy="30" r="1.5" fill="#f472b6" opacity="0.35"/>
    <circle cx="30" cy="30" r="1.5" fill="#a78bfa" opacity="0.35"/>
  </g>

  <!-- Wordmark -->
  <text x="52" y="34" font-family="'Outfit', 'Segoe UI', sans-serif" font-weight="700" font-size="30" letter-spacing="-0.5">
    <tspan fill="#e0e0e6">Ped</tspan><tspan fill="#a78bfa" font-size="33">Q</tspan><tspan fill="#a78bfa">u</tspan><tspan fill="#e0e0e6">EST</tspan>
  </text>

  <!-- Decorative EEG underline -->
  <path d="M52 42 L68 42 L72 38 L76 46 L80 36 L84 48 L88 37 L92 44 L96 42 L270 42"
        fill="none" stroke="url(#wave-grad-dark)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>
</svg>